services:
  postgres:
    image: postgres:16-alpine
    container_name: perunor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: perunor
      POSTGRES_PASSWORD: perunor
      POSTGRES_DB: perunor_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
